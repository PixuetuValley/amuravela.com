{{ define "styles" }}
    <style>
        {{- with resources.Get "css/list.css" | css.PostCSS -}}
            {{- .Content | safeCSS -}}
        {{- end -}}
    </style>
{{ end }}

{{ define "main" }}
    <div class="watermark"></div>
    <div class="container">
        <section>
            <div class="summary">
                <h1 class="title">{{ .Title }}</h1>
                {{ .Content }}
            </div>
        </section>
        {{ with .Pages }}
        <section>
            <div class="content">
                <ul class="list">
                    {{ range . }}
                        <li>
                            <a href="{{ .Permalink }}">{{ .Title }} <span class="arrow-right">&#8594;</span></a>
                        </li>
                    {{ end }}
                </ul>
            </div>
        </section>
        {{ end }}
    </div>
{{ end }}
