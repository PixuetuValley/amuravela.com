{{- $now := now -}}
{{- $year := $now.Year -}}
{{- $thisYearEnd := time.AsTime (printf "%d-06-29T14:00:00+02:00" $year) -}}
{{- if $now.After $thisYearEnd -}}{{- $year = add $year 1 -}}{{- end -}}
<script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Event",
        "name": "L'Amuravela",
        "url": "{{ .Site.BaseURL }}",
        "startDate": "{{ printf "%d-06-29T12:00:00+02:00" $year }}",
        "endDate": "{{ printf "%d-06-29T14:00:00+02:00" $year }}",
        "eventSchedule": {
            "@type": "Schedule",
            "repeatFrequency": "P1Y",
            "byMonth": 6,
            "byMonthDay": 29,
            "startTime": "12:00",
            "endTime": "14:00",
            "scheduleTimezone": "Europe/Madrid",
            "startDate": "1946-06-29",
            "endDate": "2099-06-29"
        },
        "eventAttendanceMode": "https://schema.org/OfflineEventAttendanceMode",
        "eventStatus": "https://schema.org/EventScheduled",
        "isAccessibleForFree": true,
        "location": {
            "@type": "Place",
            "name": "La Ribera de Cudillero",
            "address": {
                "@type": "PostalAddress",
                "streetAddress": "C. Ribera, 3-5",
                "addressLocality": "Cudillero",
                "postalCode": "33150",
                "addressRegion": "Asturias",
                "addressCountry": "ES"
            }
        },
        "image": [
            "https://amuravela.com/images/foto-antigua-lamuravela-05.jpg",
            "https://amuravela.com/images/foto-antigua-lamuravela-07.jpg"
        ],
        "description": "{{ i18n "whatP1" }}",
        "performer": {
            "@type": "Person",
            "name": "Cesáreo Marqués Valle",
            "url": "https://amuravela.com/reciters/cesareo-marques-valle/"
        },
        "organizer": {
            "@type": "Organization",
            "name": "L'Amuravela",
            "url": "https://amuravela.com"
        }
    }
</script>
