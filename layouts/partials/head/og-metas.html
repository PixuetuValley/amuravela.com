<meta property="og:title" content="{{ if .IsHome }}{{ .Site.Params.Title }}{{ else }}{{ .Title }}{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:description" content="{{ if .IsHome }}{{ .Site.Params.Description }}{{ else }}{{ .Description | default .Site.Params.Description }}{{ end }}">
<meta property="og:image" content="{{ .Params.Image.Src | default "images/foto-antigua-lamuravela-05.jpg" | absURL }}">
<meta property="og:type" content="{{ if .IsHome }}website{{ else }}article{{ end }}">
<meta property="og:site_name" content="{{ .Site.Params.organizationName }}">
<meta property="og:locale" content="{{ if eq .Site.Language.Lang "es" }}es_ES{{ else }}en_US{{ end }}">
