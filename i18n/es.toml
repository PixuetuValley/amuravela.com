[historyP1]
other = "No se sabe exactamente cuándo fue el comienzo de esta tradición. Según diversos comentarios y estudios, podría datar de hace más de 400 años (hacia 1569), época en que tuvo lugar la construcción de la Iglesia bajo la advocación de San Pedro."
[historyP2]
other = "Durante esa época habían vuelto los marineros que acompañaron a D. Alvaro Menéndez en la Conquista de la Florida, embarcados en una nave construida en Cudillero, “El Espíritu Santo”. Durante ese viaje aprendieron el saludo que se hacía al Almirante y quisieron hacer lo mismo con su Santo Patrono..."
